<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FISI计算器 - 食物炎症指数评估工具，帮助您评估饮食的炎症指数">
    <meta name="keywords" content="FISI,食物炎症指数,营养评估,健康饮食">
    <title>FISI 计算器 - 食物炎症指数评估工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: transparent; /* 改为透明以透出 Canvas 背景 */
            margin: 0;
            min-height: 100vh;
        }
        /* Canvas 背景容器 */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            background: linear-gradient(to bottom right, #f8fafc, #f1f5f9);
        }
        
        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .spinner {
            border: 2px solid #e2e8f0;
            border-top: 2px solid #0f172a;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes autoScroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }
        .auto-scrolling {
            animation: autoScroll 300s linear infinite;
        }
        /* 自定义滚动条使其更纤细 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* 玻璃态卡片：增强了磨砂玻璃质感 */
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 1.25rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .glass-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.03), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
        }
    </style>
</head>
<body class="text-slate-800 antialiased">
    <canvas id="bg-canvas"></canvas>

            <p class="text-sm text-slate-600 font-bold tracking-wide">FISI Data Analytics &copy; 2026</p>

    <script>
        // -------------------------
        // 1. Canvas 背景动画逻辑
        // -------------------------
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        function initCanvas() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            particles = [];
            // 根据屏幕宽度决定粒子数量
            const particleCount = window.innerWidth < 768 ? 25 : 60;
            for(let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.4, // 极慢的移动速度，显得高级
                    vy: (Math.random() - 0.5) * 0.4,
                    radius: Math.random() * 1.5 + 0.5
                });
            }
            animateCanvas();
        }

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, width, height);
            // 节点颜色（浅蓝灰）
            ctx.fillStyle = 'rgba(148, 163, 184, 0.4)'; 
            // 连线颜色
            ctx.strokeStyle = 'rgba(148, 163, 184, 0.15)';
            ctx.lineWidth = 0.8;

            for(let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;

                // 边缘反弹
                if(p.x < 0 || p.x > width) p.vx *= -1;
                if(p.y < 0 || p.y > height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();

                // 绘制连线
                for(let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if(dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateCanvas);
        }
        
        // 启动背景
        initCanvas();


        // -------------------------
        // 2. 核心计算器逻辑 (保持不变，优化了样式映射)
        // -------------------------
        let foodsData = [];
        let fuse = null;
        let selectedFoods = [];
        let selectedFood = null;
        let currentLang = 'zh'; 
        
        const i18n = {
            zh: {
                title: 'FISI 计算器', subtitle: 'Food Inflammation Scores',
                searchLabel: '搜索营养成分', searchPlaceholder: '输入食物名称或代码...',
                foodCount: '已接入', foodCountUnit: '项数据记录',
                recommended: '抗炎食材推荐', recommendedHint: 'High FII',
                searchResults: '检索结果', addFood: '设定参数',
                foodName: '目标食材', fiiValue: '参考系数 (FII)',
                amount: '摄入重量 (克 / g)', amountPlaceholder: '输入数值',
                addToRecipe: '写入数据', cancel: '取消',
                fisiTotal: '综合指数评估', noFood: '待量化',
                criteria: '临界值 (-6.85)',
                criteriaDesc: '指数 > -6.85 表现为 <span class="text-rose-600 font-semibold">促炎倾向</span><br>指数 < -6.85 表现为 <span class="text-emerald-600 font-semibold">抗炎倾向</span>',
                todayRecipe: '样本清单', clearAll: '清空',
                noFoodInList: '当前列表为空', contribution: 'Score',
                loading: '正在连接数据库...', loadError: '数据接入失败',
                noMatch: '未检索到相关数据', foodCode: 'ID',
                proInflammatory: '促炎 (Pro-inflammatory)', antiInflammatory: '抗炎 (Anti-inflammatory)'
            },
            en: {
                title: 'FISI Analytics', subtitle: 'Food Inflammation Scores',
                searchLabel: 'Search Database', searchPlaceholder: 'Enter name or ID...',
                foodCount: 'Connected', foodCountUnit: 'records',
                recommended: 'Recommended', recommendedHint: 'High FII',
                searchResults: 'Results', addFood: 'Set Parameters',
                foodName: 'Subject', fiiValue: 'FII Coefficient',
                amount: 'Weight (g)', amountPlaceholder: 'Enter value',
                addToRecipe: 'Inject Data', cancel: 'Cancel',
                fisiTotal: 'Aggregate Score', noFood: 'Awaiting Input',
                criteria: 'Threshold (-6.85)',
                criteriaDesc: 'Score > -6.85 indicates <span class="text-rose-600 font-semibold">Pro-inflammatory</span><br>Score < -6.85 indicates <span class="text-emerald-600 font-semibold">Anti-inflammatory</span>',
                todayRecipe: 'Sample List', clearAll: 'Clear',
                noFoodInList: 'List is empty', contribution: 'Score',
                loading: 'Connecting to database...', loadError: 'Connection Failed',
                noMatch: 'No records found', foodCode: 'ID',
                proInflammatory: 'Pro-inflammatory', antiInflammatory: 'Anti-inflammatory'
            }
        };

        function updateLanguage() {
            const texts = i18n[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (texts[key]) {
                    if (el.tagName === 'INPUT') el.placeholder = texts[key];
                    else el.innerHTML = texts[key]; 
                }
            });
            updateDashboard();
        }

        function displayRecommendedFoods() {
            const topFoods = [...foodsData].filter(f => f.FII_score > 25).sort((a, b) => b.FII_score - a.FII_score);
            const scrollContent = document.getElementById('scrollContent');
            scrollContent.innerHTML = topFoods.map(food => {
                const fiiColor = food.FII < 0 ? 'text-emerald-600' : 'text-rose-600';
                return `
                    <div class="p-4 bg-white/60 border border-white hover:bg-white hover:shadow-md cursor-pointer transition-all duration-300 group rounded-lg"
                         onclick="selectFood('${food.Food_code}')">
                        <div class="flex justify-between items-center">
                            <div class="flex-1 pr-4">
                                <p class="text-sm font-semibold text-slate-800 group-hover:text-black">${food.Main_food_description}</p>
                                <p class="text-[10px] text-slate-400 mt-1 font-mono tracking-wider">${i18n[currentLang].foodCode}: ${food.Food_code}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-mono text-xs font-bold ${fiiColor} bg-slate-50 px-2.5 py-1 rounded-md border border-slate-100">${food.FII.toFixed(4)}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            scrollContent.innerHTML += scrollContent.innerHTML; // 用于无限滚动
            scrollContent.classList.add('auto-scrolling');
        }

        async function init() {
            try {
                // 注意这里使用的仍然是 Github Pages 可以读取的相对路径
                const response = await fetch('./data/foods.json');
                if (!response.ok) throw new Error('Network error');
                
                foodsData = await response.json();
                document.getElementById('foodCount').textContent = foodsData.length;
                
                fuse = new Fuse(foodsData, {
                    keys: ['Main_food_description', 'Food_code'],
                    threshold: 0.3,
                    minMatchCharLength: 2
                });
                
                displayRecommendedFoods();
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                bindEvents();
            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <div class="text-rose-600 bg-rose-50/80 backdrop-blur p-6 rounded-2xl max-w-sm mx-auto border border-rose-200">
                        <p class="text-base font-bold mb-2">${i18n[currentLang].loadError}</p>
                        <p class="text-xs text-rose-500 mb-3">如果是在本地直接双击打开 HTML，浏览器会拦截 JSON 读取。<br><br>请使用 VS Code 的 Live Server 插件，或推送到 GitHub Pages 上查看。</p>
                    </div>
                `;
            }
        }

        function bindEvents() {
            const searchInput = document.getElementById('searchInput');
            let timer;
            searchInput.addEventListener('input', (e) => {
                clearTimeout(timer);
                timer = setTimeout(() => handleSearch(e.target.value), 300);
            });
            document.getElementById('addFoodBtn').addEventListener('click', handleAddFood);
            document.getElementById('cancelBtn').addEventListener('click', hideInputModal);
            document.getElementById('clearAllBtn').addEventListener('click', clearAllFoods);
            document.getElementById('langToggle').addEventListener('click', () => {
                currentLang = currentLang === 'zh' ? 'en' : 'zh';
                updateLanguage(); displayRecommendedFoods(); updateFoodList();
            });
        }

        function handleSearch(query) {
            const resBox = document.getElementById('searchResults'), list = document.getElementById('resultsList'), recBox = document.getElementById('recommendedFoods');
            if (!query || query.length < 2) { resBox.classList.add('hidden'); recBox.classList.remove('hidden'); return; }
            recBox.classList.add('hidden');
            const results = fuse.search(query).slice(0, 10);
            if (results.length === 0) {
                list.innerHTML = `<p class="text-slate-400 text-sm font-medium text-center py-10">${i18n[currentLang].noMatch}</p>`;
                resBox.classList.remove('hidden'); return;
            }
            list.innerHTML = results.map(r => {
                const f = r.item, col = f.FII < 0 ? 'text-emerald-600' : 'text-rose-600';
                return `
                    <div class="p-4 bg-white/60 border border-white rounded-xl hover:bg-white hover:shadow-md cursor-pointer transition-all group"
                         onclick="selectFood('${f.Food_code}')">
                        <div class="flex justify-between items-center">
                            <div class="flex-1 pr-4">
                                <p class="text-sm font-semibold text-slate-800">${f.Main_food_description}</p>
                                <p class="text-[10px] text-slate-400 mt-1 font-mono tracking-wider">ID: ${f.Food_code}</p>
                            </div>
                            <p class="text-xs font-mono font-bold px-2.5 py-1 rounded-md bg-slate-50 border border-slate-100 ${col}">${f.FII.toFixed(4)}</p>
                        </div>
                    </div>`;
            }).join('');
            resBox.classList.remove('hidden');
        }

        function selectFood(code) {
            selectedFood = foodsData.find(f => f.Food_code === code);
            document.getElementById('selectedFoodName').textContent = selectedFood.Main_food_description;
            document.getElementById('selectedFoodFII').textContent = selectedFood.FII.toFixed(4);
            document.getElementById('amountInput').value = '';
            document.getElementById('foodInputModal').classList.remove('hidden');
            document.getElementById('foodInputModal').scrollIntoView({ behavior: 'smooth', block: 'center' });
            setTimeout(() => document.getElementById('amountInput').focus(), 300);
        }

        function hideInputModal() { document.getElementById('foodInputModal').classList.add('hidden'); selectedFood = null; }

        function handleAddFood() {
            const amt = parseFloat(document.getElementById('amountInput').value);
            if (!selectedFood || !amt || amt <= 0) return;
            selectedFoods.push({
                id: Date.now().toString(), code: selectedFood.Food_code, desc: selectedFood.Main_food_description,
                fii: selectedFood.FII, amt: amt, contrib: (amt / 100) * selectedFood.FII
            });
            updateFoodList(); updateDashboard(); hideInputModal();
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').classList.add('hidden');
            document.getElementById('recommendedFoods').classList.remove('hidden');
        }

        function removeFood(id) { selectedFoods = selectedFoods.filter(f => f.id !== id); updateFoodList(); updateDashboard(); }
        function clearAllFoods() { selectedFoods = []; updateFoodList(); updateDashboard(); }

        function updateFoodList() {
            const list = document.getElementById('foodList'), clearBtn = document.getElementById('clearAllBtn'), cnt = document.getElementById('recipeCount');
            if (selectedFoods.length === 0) {
                list.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-slate-300"><p class="text-sm font-medium mt-4">${i18n[currentLang].noFoodInList}</p></div>`;
                clearBtn.classList.add('hidden'); cnt.classList.add('hidden'); return;
            }
            clearBtn.classList.remove('hidden'); cnt.classList.remove('hidden'); cnt.textContent = selectedFoods.length;
            list.innerHTML = selectedFoods.map(f => `
                <div class="p-4 bg-white/70 border border-white rounded-xl flex justify-between items-center shadow-sm fade-in">
                    <div class="flex-1 pr-4">
                        <p class="text-sm font-bold text-slate-800 line-clamp-1">${f.desc}</p>
                        <div class="flex items-center text-xs font-semibold text-slate-500 mt-1.5 space-x-3">
                            <span>${f.amt}g</span><span class="text-slate-300">|</span>
                            <span class="font-mono ${f.contrib < 0 ? 'text-emerald-500' : 'text-rose-500'}">Score: ${f.contrib.toFixed(3)}</span>
                        </div>
                    </div>
                    <button onclick="removeFood('${f.id}')" class="p-2 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>`).join('');
        }

        function updateDashboard() {
            const tot = selectedFoods.reduce((s, f) => s + f.contrib, 0), thres = -6.85, txt = i18n[currentLang];
            const disp = document.getElementById('fisiDisplay'), badge = document.getElementById('statusBadge');
            if (selectedFoods.length === 0) {
                disp.textContent = '0.00'; disp.className = 'text-7xl font-light tracking-tighter py-6 text-slate-300 transition-colors duration-700';
                badge.textContent = txt.noFood; badge.className = 'inline-flex items-center px-4 py-1.5 rounded-full text-xs font-bold tracking-wide bg-slate-100 text-slate-500 border border-slate-200';
                return;
            }
            disp.textContent = tot.toFixed(2);
            if (tot > thres) {
                disp.className = 'text-7xl font-light tracking-tighter py-6 text-rose-600 drop-shadow-sm transition-colors duration-700';
                badge.textContent = txt.proInflammatory; badge.className = 'inline-flex items-center px-4 py-1.5 rounded-full text-xs font-bold tracking-wide bg-rose-100 text-rose-700 border border-rose-200 shadow-sm';
            } else {
                disp.className = 'text-7xl font-light tracking-tighter py-6 text-emerald-600 drop-shadow-sm transition-colors duration-700';
                badge.textContent = txt.antiInflammatory; badge.className = 'inline-flex items-center px-4 py-1.5 rounded-full text-xs font-bold tracking-wide bg-emerald-100 text-emerald-700 border border-emerald-200 shadow-sm';
            }
        }

        init();
    </script>
</body>
</html>
